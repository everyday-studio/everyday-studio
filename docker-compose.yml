services:
  frontend:
    image: node:24-alpine
    container_name: team-frontend
    working_dir: /app/app
    volumes:
      - .:/app
    ports:
      - "4321:4321" # Astro default port
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

networks:
  default:
    name: caddy_net
    external: true 