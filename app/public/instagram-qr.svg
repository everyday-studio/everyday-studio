<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- QR Code Background -->
  <rect width="200" height="200" fill="white"/>
  
  <!-- QR Pattern representation -->
  <g fill="black">
    <!-- Top-left finder pattern -->
    <rect x="10" y="10" width="50" height="50"/>
    <rect x="15" y="15" width="40" height="40" fill="white"/>
    <rect x="20" y="20" width="30" height="30"/>
    
    <!-- Top-right finder pattern -->
    <rect x="140" y="10" width="50" height="50"/>
    <rect x="145" y="15" width="40" height="40" fill="white"/>
    <rect x="150" y="20" width="30" height="30"/>
    
    <!-- Bottom-left finder pattern -->
    <rect x="10" y="140" width="50" height="50"/>
    <rect x="15" y="145" width="40" height="40" fill="white"/>
    <rect x="20" y="150" width="30" height="30"/>
    
    <!-- Data pattern (simplified representation of dots) -->
    <rect x="70" y="20" width="4" height="4"/>
    <rect x="80" y="20" width="4" height="4"/>
    <rect x="90" y="20" width="4" height="4"/>
    <rect x="100" y="20" width="4" height="4"/>
    <rect x="110" y="20" width="4" height="4"/>
    <rect x="120" y="20" width="4" height="4"/>
    
    <rect x="70" y="30" width="4" height="4"/>
    <rect x="90" y="30" width="4" height="4"/>
    <rect x="110" y="30" width="4" height="4"/>
    
    <rect x="70" y="40" width="4" height="4"/>
    <rect x="78" y="40" width="4" height="4"/>
    <rect x="86" y="40" width="4" height="4"/>
    <rect x="94" y="40" width="4" height="4"/>
    <rect x="102" y="40" width="4" height="4"/>
    <rect x="110" y="40" width="4" height="4"/>
    <rect x="118" y="40" width="4" height="4"/>
  </g>
  
  <!-- Instagram icon in center -->
  <g transform="translate(85, 85)">
    <rect x="-20" y="-20" width="40" height="40" rx="8" fill="none" stroke="#E1306C" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#E1306C" stroke-width="2"/>
    <circle cx="8" cy="-8" r="1.5" fill="#E1306C"/>
  </g>
</svg>